version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fintrax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrax_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrax_password}
      POSTGRES_DB: ${POSTGRES_DB:-fintrax_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintrax_user} -d ${POSTGRES_DB:-fintrax_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrax-network

  redis:
    image: redis:7-alpine
    container_name: fintrax-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrax-network

volumes:
  postgres_data:
  redis_data:

networks:
  fintrax-network:
    driver: bridge
