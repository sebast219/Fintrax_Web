version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fintrax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrax_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrax_password}
      POSTGRES_DB: ${POSTGRES_DB:-fintrax_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintrax_user} -d ${POSTGRES_DB:-fintrax_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrax-network

  redis:
    image: redis:7-alpine
    container_name: fintrax-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrax-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: fintrax-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrax_user}:${POSTGRES_PASSWORD:-fintrax_password}@postgres:5432/${POSTGRES_DB:-fintrax_db}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fintrax-network

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: fintrax-frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:3000
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend
    networks:
      - fintrax-network

volumes:
  postgres_data:
  redis_data:

networks:
  fintrax-network:
    driver: bridge
