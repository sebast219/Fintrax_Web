<section id="faq" class="relative py-24 text-white overflow-hidden z-10">

  <div class="relative z-10 max-w-7xl mx-auto px-8">
    <!-- Header -->
    <div class="text-center mb-20">
      <h2 class="text-4xl lg:text-6xl font-bold tracking-tight text-white mb-6">
        Preguntas
        <span class="text-[#00D4AA]">Frecuentes</span>
      </h2>
      <p class="text-xl text-[#94A3B8] max-w-4xl mx-auto leading-relaxed">
        Todo lo que necesitás saber sobre Fintrax
      </p>
    </div>

    <!-- Filtro por categoría -->
    <div class="flex justify-center mb-12">
      <div class="inline-flex bg-white/3 backdrop-blur-sm rounded-full p-1 border border-white/8">
        <button 
          *ngFor="let category of ['todos', ...categories]; trackBy: trackByCategory"
          (click)="setCategory(category)"
          class="px-6 py-3 rounded-full text-sm font-medium transition-all duration-300"
          [class]="selectedCategory() === category 
            ? 'bg-blue-600/20 text-blue-400 shadow-lg shadow-blue-600/10 border border-blue-500/30' 
            : 'text-gray-400 hover:text-white hover:bg-white/5'">
          {{ category === 'todos' ? 'Todas' : category.charAt(0).toUpperCase() + category.slice(1) }}
        </button>
      </div>
    </div>

    <!-- Búsqueda -->
    <div class="max-w-3xl mx-auto mb-12">
      <div class="relative">
        <input 
          type="text"
          placeholder="Buscar en las preguntas frecuentes..."
          (input)="searchFAQs($event.target.value)"
          class="w-full px-6 py-4 pr-12 bg-white/3 backdrop-blur-sm border border-white/8 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:border-blue-500/30 focus:bg-white/5 transition-all duration-300">
        <svg class="absolute right-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
    </div>

    <!-- Lista de FAQs -->
    <div class="max-w-5xl mx-auto mb-20">
      <div class="space-y-4">
        <div 
          *ngFor="let faq of getFilteredFAQs(); trackBy: trackByFaq" 
          class="group bg-white/3 backdrop-blur-sm rounded-2xl border border-white/8 overflow-hidden hover:bg-white/5 hover:border-blue-500/20 transition-all duration-300">
          
          <button 
            (click)="toggleFAQ(faq.id)"
            class="w-full px-8 py-6 text-left flex items-center justify-between hover:bg-white/[0.02] transition-colors duration-300">
            <div class="flex items-center">
              <div class="w-12 h-12 bg-blue-600/10 text-blue-400 rounded-xl flex items-center justify-center text-lg font-bold mr-4 group-hover:bg-blue-600/15 transition-colors duration-300">
                Q
              </div>
              <span class="text-lg font-medium text-white">{{ faq.question }}</span>
            </div>
            <svg 
              class="w-6 h-6 text-gray-400 transition-transform duration-300"
              [class]="faq.expanded ? 'rotate-180 text-blue-400' : ''"
              fill="none" 
              stroke="currentColor" 
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          
          <div 
            *ngIf="faq.expanded" 
            class="px-8 py-6 bg-white/[0.01] border-t border-white/5">
            <div class="flex items-start">
              <div class="w-12 h-12 bg-green-600/10 text-green-400 rounded-xl flex items-center justify-center text-lg font-bold mr-4">
                A
              </div>
              <p class="text-gray-300 leading-relaxed text-lg">{{ faq.answer }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Acciones adicionales -->
    <div class="text-center">
      <div class="space-y-8">
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <button 
            (click)="toggleAll(true)"
            class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-[#00D4AA] text-[#0A0A0F] font-semibold hover:bg-[#00D4AA]/90 transition-all duration-300 hover:scale-[1.02] shadow-lg shadow-[#00D4AA]/25">
            Expandir Todas
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <button 
            (click)="toggleAll(false)"
            class="inline-flex items-center gap-2 px-8 py-4 rounded-full border border-white/20 bg-white/5 backdrop-blur-xl text-white font-medium hover:bg-white/10 transition-all duration-300 hover:scale-[1.02]">
            Colapsar Todas
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
            </svg>
          </button>
        </div>
        
        <div class="text-[#94A3B8]">
          <p class="mb-4 text-lg">¿No encontraste lo que buscabas?</p>
          <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a 
              href="/auth/register"
              class="inline-flex items-center gap-2 px-6 py-3 rounded-full border border-[#00D4AA]/30 bg-[#00D4AA]/10 text-[#00D4AA] font-medium hover:bg-[#00D4AA]/20 transition-all duration-300">
              Contactar Soporte
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </a>
            <button class="inline-flex items-center gap-2 px-6 py-3 rounded-full border border-white/20 bg-white/5 backdrop-blur-xl text-white font-medium hover:bg-white/10 transition-all duration-300">
              Visitar Centro de Ayuda
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
