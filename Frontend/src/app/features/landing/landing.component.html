<main class="relative min-h-screen bg-[#0A0A0F] text-white overflow-hidden scroll-smooth"
      style="background: 
                radial-gradient(ellipse at top, rgba(0,212,170,0.08) 0%, transparent 50%), #0A0A0F;
              background-image: 
                radial-gradient(ellipse at top, rgba(0,212,170,0.08) 0%, transparent 50%),
                linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
              background-size: 100% 100%, 20px 20px, 20px 20px;
              background-attachment: fixed;
              position: relative;
              scroll-behavior: smooth;">

  <!-- Fixed Navigation Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[#0A0A0F]/80 backdrop-blur-xl border-b border-white/10">
    <div class="max-w-7xl mx-auto px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <div class="flex items-center">
          <h1 class="text-2xl font-bold tracking-tight text-white">
            Fintrax
          </h1>
          <span class="ml-3 text-xs text-[#00D4AA] font-medium tracking-widest uppercase">
            Precision Finance
          </span>
        </div>

        <!-- Navigation Links -->
        <nav class="hidden md:flex items-center space-x-8">
          <a 
            (click)="smoothScrollToSection('hero')"
            class="text-gray-300 hover:text-[#00D4AA] transition-all duration-300 font-medium hover:scale-105 cursor-pointer">
            Inicio
          </a>
          <a 
            (click)="smoothScrollToSection('features')"
            class="text-gray-300 hover:text-[#00D4AA] transition-all duration-300 font-medium hover:scale-105 cursor-pointer">
            Características
          </a>
          <a 
            (click)="smoothScrollToSection('comparison')"
            class="text-gray-300 hover:text-[#00D4AA] transition-all duration-300 font-medium hover:scale-105 cursor-pointer">
            Comparación
          </a>
          <a 
            (click)="smoothScrollToSection('pricing')"
            class="text-gray-300 hover:text-[#00D4AA] transition-all duration-300 font-medium hover:scale-105 cursor-pointer">
            Planes
          </a>
          <a 
            (click)="smoothScrollToSection('testimonials')"
            class="text-gray-300 hover:text-[#00D4AA] transition-all duration-300 font-medium hover:scale-105 cursor-pointer">
            Testimonios
          </a>
          <a 
            (click)="smoothScrollToSection('faq')"
            class="text-gray-300 hover:text-[#00D4AA] transition-all duration-300 font-medium hover:scale-105 cursor-pointer">
            FAQ
          </a>
        </nav>

        <!-- CTA Buttons -->
        <div class="flex items-center space-x-4">
          <a 
            href="/auth/login"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 backdrop-blur-xl text-xs text-white uppercase tracking-[0.3em] hover:bg-white/10 transition-all duration-300 hover:scale-[1.02]">
            Iniciar Sesión
          </a>
          <a 
            href="/auth/register"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-[#00D4AA] text-[#0A0A0F] font-semibold hover:bg-[#00D4AA]/90 transition-all duration-300 hover:scale-[1.02] shadow-lg shadow-[#00D4AA]/25">
            Comenzar Gratis
          </a>
        </div>

        <!-- Mobile Menu Button -->
        <button class="md:hidden text-white hover:text-[#00D4AA] transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Global Ambient Glow Elements - Register/Login Style -->
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute bottom-[-200px] left-[-200px] w-[600px] h-[600px] rounded-full bg-[#00D4AA]/10 blur-[120px]"></div>
    <div class="absolute top-[-150px] right-[-150px] w-[400px] h-[400px] rounded-full bg-[#00D4AA]/8 blur-[100px]"></div>
    <div class="absolute top-1/3 left-1/4 w-[300px] h-[300px] rounded-full bg-[#00D4AA]/5 blur-[80px]"></div>
    <div class="absolute bottom-1/3 right-1/4 w-[300px] h-[300px] rounded-full bg-[#00D4AA]/5 blur-[80px]"></div>
  </div>

  <!-- Hero Section -->
  <app-hero></app-hero>

  <!-- Features Section -->
  <app-features></app-features>

  <!-- Comparison Section -->
  <app-comparison></app-comparison>

  <!-- Pricing Section -->
  <app-pricing></app-pricing>

  <!-- Testimonials Section -->
  <app-testimonials></app-testimonials>

  <!-- FAQ Section -->
  <app-faq></app-faq>

  <!-- CTA Section -->
  <app-cta></app-cta>
</main>
