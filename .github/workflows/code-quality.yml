name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Code Quality
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Backend/package-lock.json

    - name: Install dependencies
      working-directory: ./Backend
      run: npm ci

    - name: Run ESLint with checkstyle
      working-directory: ./Backend
      run: npm run lint -- --format=checkstyle --output-file=eslint-report.xml

    - name: Run SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Check code formatting
      working-directory: ./Backend
      run: npm run format:check

    - name: Run TypeScript compiler check
      working-directory: ./Backend
      run: npx tsc --noEmit --strict

  # Frontend Code Quality
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./Frontend
      run: npm ci

    - name: Run ESLint
      working-directory: ./Frontend
      run: npm run lint -- --format=checkstyle --output-file=eslint-report.xml

    - name: Run Angular linting
      working-directory: ./Frontend
      run: npx ng lint

    - name: Check code formatting
      working-directory: ./Frontend
      run: npm run format:check

    - name: Run TypeScript compiler check
      working-directory: ./Frontend
      run: npx ng build --aot --no-optimization

  # Dependency Security Check
  security-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      with:
        args: --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: Upload Snyk results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: snyk.sarif
