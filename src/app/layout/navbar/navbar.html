<header class="fixed top-0 w-full z-50 glass-panel border-b border-slate-200/80 shadow-strong">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-slate-900 to-slate-700 rounded-lg flex items-center justify-center shadow-lg shadow-slate-900/30">
                    <span class="text-white font-bold text-lg font-display">F</span>
                </div>
                <span class="font-display font-bold text-xl tracking-tight text-slate-900">Fintrax</span>
            </div>

            <!-- Nav Links -->
            <nav class="hidden md:flex items-center gap-1">
                <button class="px-4 py-2 rounded-lg text-sm font-medium text-slate-900 bg-slate-100/80">Dashboard</button>
                <button class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/50 transition-colors">Tarjetas</button>
                <button class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/50 transition-colors">Informes</button>
                <button class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100/50 transition-colors">Configuración</button>
            </nav>

            <!-- Actions -->
            <div class="flex items-center gap-4">
                <button class="relative p-2 text-slate-500 hover:text-slate-900 transition-colors rounded-lg hover:bg-slate-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full ring-2 ring-white"></span>
                </button>
                
                <button class="hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-lg text-sm font-medium hover:bg-slate-800 transition-all duration-200 shadow-lg shadow-slate-900/25 hover:shadow-xl hover:shadow-slate-900/30">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span>Nueva Transacción</span>
                </button>

                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 p-[2px] cursor-pointer hover:scale-105 transition-all duration-200 shadow-lg shadow-blue-500/25 hover:shadow-xl hover:shadow-blue-500/30">
                    <div class="w-full h-full rounded-full bg-white flex items-center justify-center">
                        <span class="text-xs font-bold bg-gradient-to-br from-blue-600 to-purple-600 bg-clip-text text-transparent">JD</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
