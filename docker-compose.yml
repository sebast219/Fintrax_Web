version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fintrax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintrax_user
      POSTGRES_PASSWORD: fintrax_password
      POSTGRES_DB: fintrax_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrax_user -d fintrax_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrax-network

  backend:
    build:
      context: ./fintrax-api
      dockerfile: Dockerfile
    container_name: fintrax-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://fintrax_user:fintrax_password@postgres:5432/fintrax_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:4200
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintrax-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrax-frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:3000
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - fintrax-network

volumes:
  postgres_data:

networks:
  fintrax-network:
    driver: bridge
