<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintrax - Crear Cuenta</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
   
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="register-styles.css">

</head>
<body>
    <div class="mobile-container">
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <div class="logo-section">
            <div class="logo">
                <img src="https://picsum.photos/seed/fintrax-logo/40/40.jpg" alt="Fintrax Logo" class="logo-img">
                <span>Fintrax</span>
            </div>
        </div>

        <div class="decorative-circles">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="circle circle-4"></div>
            <div class="circle circle-5"></div>
            <div class="circle circle-6"></div>
        </div>

        <div class="register-container">
            <h2 class="welcome-text">Crear cuenta</h2>
            <p class="subtitle">Únete a Fintrax y comienza a gestionar tus finanzas</p>
            
            <form id="registerForm">
                <div class="mb-3">
                    <input type="text" class="form-control custom-input" id="fullName" placeholder="Nombre completo" required>
                </div>
                
                <div class="mb-3">
                    <input type="email" class="form-control custom-input" id="email" placeholder="Correo electrónico" required>
                </div>
                
                <div class="mb-3 password-wrapper">
                    <input type="password" class="form-control custom-input" id="password" placeholder="Crear contraseña" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <div class="mb-3 password-wrapper">
                    <input type="password" class="form-control custom-input" id="confirmPassword" placeholder="Confirmar contraseña" required>
                    <button type="button" class="toggle-password" id="toggleConfirmPassword">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <div class="mb-3">
                    <div class="form-check terms-check">
                        <input class="form-check-input" type="checkbox" id="acceptTerms" required>
                        <label class="form-check-label terms-label" for="acceptTerms">
                            Acepto los <a href="#" class="terms-link">Términos de servicio</a> y la <a href="#" class="terms-link">Política de privacidad</a>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-register">Crear cuenta</button>
            </form>
            <div class="login-section">
                <p class="login-text">¿Ya tienes una cuenta? <a href="index.html" class="login-link">Iniciar sesión</a></p>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="home-indicator"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="register-script.js"></script>
</body>
</html>
