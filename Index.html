<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintrax - Iniciar Sesión</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo">
                <i class="fas fa-gem"></i>
                <span>Fintrax</span>
            </div>
        </div>

        <!-- Decorative Circles -->
        <div class="decorative-circles">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="circle circle-4"></div>
            <div class="circle circle-5"></div>
            <div class="circle circle-6"></div>
        </div>

        <!-- Login Form -->
        <div class="login-container">
            <h2 class="welcome-text">Bienvenido de nuevo</h2>
            
            <form id="loginForm">
                <div class="mb-3">
                    <input type="email" class="form-control custom-input" id="email" placeholder="Ingresa tu correo electrónico" required>
                </div>
                
                <div class="mb-3 password-wrapper">
                    <input type="password" class="form-control custom-input" id="password" placeholder="Ingresa tu contraseña" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <div class="form-options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Recuérdame
                        </label>
                    </div>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-login">Iniciar Sesión</button>
            </form>
            
            <div class="signup-section">
                <p class="signup-text">¿No tienes una cuenta?</p>
                <a href="register.html" class="btn btn-signup">Sign up now</a>
            </div>
            
            <!-- Fingerprint Icon -->
            <div class="fingerprint-section">
                <button type="button" class="fingerprint-btn">
                    <i class="fas fa-fingerprint"></i>
                </button>
            </div>
        </div>

        <!-- Bottom Navigation Bar -->
        <div class="bottom-bar">
            <div class="home-indicator"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
